<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="white">
  <style>
    .ground { stroke: white; stroke-width: 2; fill: none; }
    .metal { fill: white; }
    .joint { fill: white; stroke: none; }
    .box { fill: white; }
    .laptop-screen { fill: none; stroke: white; stroke-width: 3; }
    .laptop-base { fill: white; }
    .laptop-dash { stroke: white; stroke-width: 1.5; fill: none; }
    .logo-text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-weight: 700; fill: white; }

    @keyframes armSwing {
      0%   { transform: rotate(0deg); }
      8%   { transform: rotate(30deg); }
      18%  { transform: rotate(30deg); }
      30%  { transform: rotate(0deg); }
      46%  { transform: rotate(-40deg); }
      56%  { transform: rotate(-40deg); }
      70%  { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes gripL {
      0%   { transform: translateX(0); }
      13%  { transform: translateX(0); }
      17%  { transform: translateX(3px); }
      52%  { transform: translateX(3px); }
      55%  { transform: translateX(0); }
      100% { transform: translateX(0); }
    }
    @keyframes gripR {
      0%   { transform: translateX(0); }
      13%  { transform: translateX(0); }
      17%  { transform: translateX(-3px); }
      52%  { transform: translateX(-3px); }
      55%  { transform: translateX(0); }
      100% { transform: translateX(0); }
    }

    @keyframes srcBox {
      0%   { opacity: 1; }
      15%  { opacity: 1; }
      17%  { opacity: 0; }
      86%  { opacity: 0; }
      92%  { opacity: 1; }
      100% { opacity: 1; }
    }

    @keyframes carryBox {
      0%   { transform: translate(0, 0); opacity: 0; }
      15%  { transform: translate(0, 0); opacity: 0; }
      17%  { transform: translate(0, 0); opacity: 1; }
      28%  { transform: translate(-100px, -55px); opacity: 1; }
      38%  { transform: translate(-200px, -40px); opacity: 1; }
      46%  { transform: translate(-300px, 0); opacity: 1; }
      54%  { transform: translate(-300px, 0); opacity: 1; }
      56%  { transform: translate(-300px, 0); opacity: 0; }
      100% { transform: translate(0, 0); opacity: 0; }
    }

    @keyframes destBox {
      0%   { opacity: 0; }
      52%  { opacity: 0; }
      56%  { opacity: 1; }
      78%  { opacity: 1; }
      84%  { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes screenPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 700; }
      to { stroke-dashoffset: 0; }
    }

    .arm-group { transform-origin: 315px 185px; animation: armSwing 6s ease-in-out infinite 1.5s; }
    .grip-l { animation: gripL 6s ease-in-out infinite 1.5s; }
    .grip-r { animation: gripR 6s ease-in-out infinite 1.5s; }
    .src-box { animation: srcBox 6s ease-in-out infinite 1.5s; }
    .carry-box { animation: carryBox 6s ease-in-out infinite 1.5s; }
    .dest-box { animation: destBox 6s ease-in-out infinite 1.5s; }
    .laptop-dash { animation: screenPulse 2.5s ease-in-out infinite; }
    .ground-line { stroke-dasharray: 700; animation: drawLine 1.5s ease-out forwards; }
    .left-ped { opacity: 0; animation: fadeSlideUp 0.6s ease-out 0.3s forwards; }
    .robot-group { opacity: 0; animation: fadeSlideUp 0.6s ease-out 0.5s forwards; }
    .right-ped { opacity: 0; animation: fadeSlideUp 0.6s ease-out 0.7s forwards; }
    .laptop-group { opacity: 0; animation: fadeSlideUp 0.6s ease-out 0.9s forwards; }
    .text-group { opacity: 0; animation: fadeSlideUp 0.6s ease-out 1.2s forwards; }
  </style>

  <line class="ground ground-line" x1="50" y1="220" x2="750" y2="220" />

  <g class="left-ped">
    <rect x="110" y="200" width="70" height="20" rx="3" class="metal" />
    <rect x="120" y="194" width="50" height="9" rx="2" class="metal" />
    <rect x="132" y="169" width="26" height="25" rx="2" class="box dest-box" />
  </g>

  <g class="robot-group">
    <rect x="278" y="200" width="74" height="20" rx="4" class="metal" />
    <rect x="292" y="190" width="46" height="14" rx="3" class="metal" />
    <g class="arm-group">
      <circle cx="315" cy="185" r="11" class="joint" />
      <rect x="310" y="122" width="10" height="63" rx="3" class="metal" />
      <circle cx="315" cy="122" r="9" class="joint" />
      <rect x="315" y="114" width="72" height="10" rx="3" class="metal" transform="rotate(5, 315, 119)" />
      <circle cx="385" cy="121" r="7" class="joint" />
      <rect x="381" y="121" width="8" height="30" rx="2" class="metal" />
      <polygon points="377,149 399,149 403,160 373,160" class="metal" />
      <rect x="375" y="160" width="7" height="13" rx="1" class="metal grip-l" />
      <rect x="392" y="160" width="7" height="13" rx="1" class="metal grip-r" />
    </g>
  </g>

  <g class="right-ped">
    <rect x="410" y="200" width="70" height="20" rx="3" class="metal" />
    <rect x="420" y="194" width="50" height="9" rx="2" class="metal" />
    <rect x="432" y="169" width="26" height="25" rx="2" class="box src-box" />
  </g>

  <rect x="432" y="169" width="26" height="25" rx="2" class="box carry-box" />

  <g class="laptop-group">
    <rect x="570" y="135" width="95" height="65" rx="5" class="laptop-screen" />
    <line x1="581" y1="152" x2="612" y2="152" class="laptop-dash" style="animation-delay:0s" />
    <line x1="581" y1="162" x2="625" y2="162" class="laptop-dash" style="animation-delay:0.4s" />
    <line x1="581" y1="172" x2="608" y2="172" class="laptop-dash" style="animation-delay:0.8s" />
    <line x1="581" y1="182" x2="620" y2="182" class="laptop-dash" style="animation-delay:1.2s" />
    <rect x="636" y="170" width="5" height="15" rx="1" class="laptop-dash" style="animation-delay:0.2s;fill:white;stroke:none;" />
    <rect x="644" y="164" width="5" height="21" rx="1" class="laptop-dash" style="animation-delay:0.6s;fill:white;stroke:none;" />
    <rect x="652" y="172" width="5" height="13" rx="1" class="laptop-dash" style="animation-delay:1.0s;fill:white;stroke:none;" />
    <path d="M558,202 L565,200 L675,200 L682,202 L687,212 L553,212 Z" class="laptop-base" />
    <rect x="607" y="198" width="26" height="4" rx="2" class="laptop-base" />
  </g>

  <g class="text-group">
    <text x="400" y="268" text-anchor="middle" font-size="42" class="logo-text">CK IAS</text>
  </g>
</svg>
