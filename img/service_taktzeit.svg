    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Stopwatch icon -->
  <circle cx="200" cy="130" r="55" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
  <circle cx="200" cy="130" r="48" fill="none" stroke="#2d3348" stroke-width="1.5"/>
  <line x1="200" y1="130" x2="200" y2="90" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="130" x2="225" y2="140" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <circle cx="200" cy="130" r="4" fill="#22d3ee"/>
