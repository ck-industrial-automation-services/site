<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="currentColor">
  <style>
    .ground{stroke:currentColor;stroke-width:2;fill:none}
    .metal{fill:currentColor}
    .joint-dot{fill:currentColor}
    .box{fill:currentColor}
    .laptop-screen{fill:none;stroke:currentColor;stroke-width:3}
    .laptop-base{fill:currentColor}
    .laptop-dash{stroke:currentColor;stroke-width:1.5;fill:none}
    .logo-text{font-family:'Inter','Segoe UI',Arial,sans-serif;font-weight:700;fill:currentColor}

    /* ============================================================
       FORWARD KINEMATICS — 4-Joint Articulated Robot Animation
       Robot: R1(base) → L1 → R2(elbow) → L2 → R3(wrist) → L3 → R4(TCP)
       Link lengths: L1=50, L2=55, L3=25  (total reach 130px)
       R4 = -(R1+R2+R3) keeps gripper vertical at all times
       
       Waypoints calculated via FK:
       Home:           θ1=  0, θ2=-10, θ3=  5, θ4=  5  → TCP(303, 56)
       Approach Pick:  θ1= 45, θ2=-15, θ3= 10, θ4=-40  → TCP(394, 83)
       Pick:           θ1= 75, θ2=  5, θ3= 15, θ4=-95  → TCP(442,164)
       Lift:           θ1= 45, θ2=-15, θ3= 10, θ4=-40  → TCP(394, 83)
       Transit:        θ1=  0, θ2=-10, θ3=  5, θ4=  5  → TCP(303, 56)
       Approach Place: θ1=-45, θ2= 15, θ3=-10, θ4= 40  → TCP(236, 83)
       Place:          θ1=-75, θ2= -5, θ3=-15, θ4= 95  → TCP(188,164)
       Retract:        θ1=-45, θ2= 15, θ3=-10, θ4= 40  → TCP(236, 83)
       ============================================================ */

    /* R1: Base/Shoulder — main swing left/right */
    @keyframes rotR1 {
      0%,100% { transform: rotate(0deg) }
      15%     { transform: rotate(45deg) }
      22%,25% { transform: rotate(75deg) }
      32%     { transform: rotate(45deg) }
      45%     { transform: rotate(0deg) }
      55%     { transform: rotate(-45deg) }
      62%,65% { transform: rotate(-75deg) }
      72%     { transform: rotate(-45deg) }
      88%     { transform: rotate(0deg) }
    }

    /* R2: Elbow — bends outward to reach, folds to retract */
    @keyframes rotR2 {
      0%,100% { transform: rotate(-10deg) }
      15%     { transform: rotate(-15deg) }
      22%,25% { transform: rotate(5deg) }
      32%     { transform: rotate(-15deg) }
      45%     { transform: rotate(-10deg) }
      55%     { transform: rotate(15deg) }
      62%,65% { transform: rotate(-5deg) }
      72%     { transform: rotate(15deg) }
      88%     { transform: rotate(-10deg) }
    }

    /* R3: Wrist — fine orientation adjust */
    @keyframes rotR3 {
      0%,100% { transform: rotate(5deg) }
      15%     { transform: rotate(10deg) }
      22%,25% { transform: rotate(15deg) }
      32%     { transform: rotate(10deg) }
      45%     { transform: rotate(5deg) }
      55%     { transform: rotate(-10deg) }
      62%,65% { transform: rotate(-15deg) }
      72%     { transform: rotate(-10deg) }
      88%     { transform: rotate(5deg) }
    }

    /* R4: TCP — compensates all upstream rotations: θ4 = -(θ1+θ2+θ3) */
    @keyframes rotR4 {
      0%,100% { transform: rotate(5deg) }
      15%     { transform: rotate(-40deg) }
      22%,25% { transform: rotate(-95deg) }
      32%     { transform: rotate(-40deg) }
      45%     { transform: rotate(5deg) }
      55%     { transform: rotate(40deg) }
      62%,65% { transform: rotate(95deg) }
      72%     { transform: rotate(40deg) }
      88%     { transform: rotate(5deg) }
    }

    /* Gripper open/close */
    @keyframes gripL {
      0%,22%  { transform: translateX(0) }
      25%     { transform: translateX(3px) }
      62%     { transform: translateX(3px) }
      65%,100%{ transform: translateX(0) }
    }
    @keyframes gripR {
      0%,22%  { transform: translateX(0) }
      25%     { transform: translateX(-3px) }
      62%     { transform: translateX(-3px) }
      65%,100%{ transform: translateX(0) }
    }

    /* Source box: visible → disappears when grabbed → reappears */
    @keyframes srcBox {
      0%      { opacity: 1 }
      22%     { opacity: 1 }
      25%     { opacity: 0 }
      88%     { opacity: 0 }
      92%     { opacity: 1 }
      100%    { opacity: 1 }
    }

    /* Carried box: child of R4, inherits FK transforms automatically */
    @keyframes carryBox {
      0%,22%  { opacity: 0 }
      25%     { opacity: 1 }
      62%     { opacity: 1 }
      65%,100%{ opacity: 0 }
    }

    /* Dest box: appears after placement, fades for next cycle */
    @keyframes destBox {
      0%,63%  { opacity: 0 }
      65%     { opacity: 1 }
      82%     { opacity: 1 }
      86%,100%{ opacity: 0 }
    }

    @keyframes screenPulse {
      0%,100% { opacity: .4 }
      50%     { opacity: 1 }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px) }
      to   { opacity: 1; transform: translateY(0) }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 700 }
      to   { stroke-dashoffset: 0 }
    }

    /* Joint animation assignments (nested FK chain) */
    .joint-r1 { transform-origin: 315px 185px; animation: rotR1 8s ease-in-out infinite 1.5s }
    .joint-r2 { transform-origin: 315px 135px; animation: rotR2 8s ease-in-out infinite 1.5s }
    .joint-r3 { transform-origin: 315px  80px; animation: rotR3 8s ease-in-out infinite 1.5s }
    .joint-r4 { transform-origin: 315px  55px; animation: rotR4 8s ease-in-out infinite 1.5s }

    .grip-l    { animation: gripL    8s ease-in-out infinite 1.5s }
    .grip-r    { animation: gripR    8s ease-in-out infinite 1.5s }
    .src-box   { animation: srcBox   8s ease-in-out infinite 1.5s }
    .carry-box { animation: carryBox 8s ease-in-out infinite 1.5s }
    .dest-box  { animation: destBox  8s ease-in-out infinite 1.5s }
    .laptop-dash { animation: screenPulse 2.5s ease-in-out infinite }

    .ground-line  { stroke-dasharray: 700; animation: drawLine 1.5s ease-out forwards }
    .left-ped     { opacity: 0; animation: fadeSlideUp .6s ease-out .3s forwards }
    .robot-group  { opacity: 0; animation: fadeSlideUp .6s ease-out .5s forwards }
    .right-ped    { opacity: 0; animation: fadeSlideUp .6s ease-out .7s forwards }
    .laptop-group { opacity: 0; animation: fadeSlideUp .6s ease-out .9s forwards }
    .text-group   { opacity: 0; animation: fadeSlideUp .6s ease-out 1.2s forwards }
  </style>

  <!-- Ground -->
  <line class="ground ground-line" x1="50" y1="220" x2="750" y2="220"/>

  <!-- Left Pedestal (destination) -->
  <g class="left-ped">
    <rect x="160" y="200" width="60" height="20" rx="3" class="metal"/>
    <rect x="172" y="194" width="36" height="8" rx="2" class="metal"/>
    <rect x="175" y="174" width="26" height="20" rx="2" class="box dest-box"/>
  </g>

  <!-- ===== Knickarm Robot (4-joint FK chain) ===== -->
  <g class="robot-group">
    <!-- Base platform -->
    <rect x="285" y="200" width="60" height="20" rx="4" class="metal"/>
    <!-- Turntable housing -->
    <rect x="296" y="190" width="38" height="14" rx="3" class="metal"/>

    <!-- R1: Base/Shoulder (rotates entire arm) -->
    <g class="joint-r1">
      <circle cx="315" cy="185" r="9" class="joint-dot"/>
      <!-- Link 1: Upper arm (50px) -->
      <rect x="311" y="135" width="8" height="50" rx="3" class="metal"/>

      <!-- R2: Elbow (rotates forearm + wrist + TCP) -->
      <g class="joint-r2">
        <circle cx="315" cy="135" r="7" class="joint-dot"/>
        <!-- Link 2: Forearm (55px) -->
        <rect x="311" y="80" width="8" height="55" rx="3" class="metal"/>

        <!-- R3: Wrist (rotates hand + TCP) -->
        <g class="joint-r3">
          <circle cx="315" cy="80" r="6" class="joint-dot"/>
          <!-- Link 3: Hand/wrist extension (25px) -->
          <rect x="312" y="55" width="6" height="25" rx="2" class="metal"/>

          <!-- R4: TCP (compensates to keep gripper vertical) -->
          <g class="joint-r4">
            <circle cx="315" cy="55" r="5" class="joint-dot"/>
            <!-- Gripper mount (trapezoid) -->
            <polygon points="309,57 321,57 324,65 306,65" class="metal"/>
            <!-- Gripper left finger -->
            <rect x="307" y="65" width="6" height="12" rx="1" class="metal grip-l"/>
            <!-- Gripper right finger -->
            <rect x="318" y="65" width="6" height="12" rx="1" class="metal grip-r"/>
            <!-- Carried box (child of TCP — follows gripper via FK automatically) -->
            <rect x="303" y="68" width="24" height="18" rx="2" class="box carry-box"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- Right Pedestal (source) -->
  <g class="right-ped">
    <rect x="415" y="200" width="60" height="20" rx="3" class="metal"/>
    <rect x="427" y="194" width="36" height="8" rx="2" class="metal"/>
    <rect x="429" y="174" width="26" height="20" rx="2" class="box src-box"/>
  </g>

  <!-- Laptop (monitoring station) -->
  <g class="laptop-group">
    <rect x="570" y="135" width="95" height="65" rx="5" class="laptop-screen"/>
    <line x1="581" y1="152" x2="612" y2="152" class="laptop-dash" style="animation-delay:0s"/>
    <line x1="581" y1="162" x2="625" y2="162" class="laptop-dash" style="animation-delay:.4s"/>
    <line x1="581" y1="172" x2="608" y2="172" class="laptop-dash" style="animation-delay:.8s"/>
    <line x1="581" y1="182" x2="620" y2="182" class="laptop-dash" style="animation-delay:1.2s"/>
    <rect x="636" y="170" width="5" height="15" rx="1" style="animation-delay:.2s;fill:currentColor;stroke:none" class="laptop-dash"/>
    <rect x="644" y="164" width="5" height="21" rx="1" style="animation-delay:.6s;fill:currentColor;stroke:none" class="laptop-dash"/>
    <rect x="652" y="172" width="5" height="13" rx="1" style="animation-delay:1s;fill:currentColor;stroke:none" class="laptop-dash"/>
    <path d="M558,202 L565,200 L675,200 L682,202 L687,212 L553,212 Z" class="laptop-base"/>
    <rect x="607" y="198" width="26" height="4" rx="2" class="laptop-base"/>
  </g>

  <!-- Text -->
  <g class="text-group">
    <text x="400" y="268" text-anchor="middle" font-size="42" class="logo-text">CK IAS</text>
  </g>
</svg>