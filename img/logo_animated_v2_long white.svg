<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="white">
  <style>
    .ground { stroke: white; stroke-width: 2; fill: none; }
    .arm-base, .arm-seg1, .arm-seg2, .arm-seg3, .arm-gripper { fill: white; }
    .arm-joint { fill: white; stroke: none; }
    .conveyor-belt { fill: white; }
    .box { fill: white; }
    .laptop-screen { fill: none; stroke: white; stroke-width: 3; }
    .laptop-base { fill: white; }
    .laptop-dash { stroke: white; stroke-width: 1.5; fill: none; }
    .logo-text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-weight: 700; fill: white; }

    @keyframes armPickPlace {
      0%   { transform: rotate(0deg); }
      15%  { transform: rotate(-25deg); }
      25%  { transform: rotate(-25deg); }
      40%  { transform: rotate(-5deg); }
      55%  { transform: rotate(-45deg); }
      65%  { transform: rotate(-45deg); }
      80%  { transform: rotate(-10deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes gripperLeft {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(0); }
      22%  { transform: translateX(3px); }
      55%  { transform: translateX(3px); }
      62%  { transform: translateX(0); }
      100% { transform: translateX(0); }
    }
    @keyframes gripperRight {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(0); }
      22%  { transform: translateX(-3px); }
      55%  { transform: translateX(-3px); }
      62%  { transform: translateX(0); }
      100% { transform: translateX(0); }
    }
    @keyframes boxPickPlace {
      0%   { transform: translate(0, 0); opacity: 1; }
      15%  { transform: translate(0, 0); opacity: 1; }
      30%  { transform: translate(20px, -40px); opacity: 1; }
      40%  { transform: translate(40px, -60px); opacity: 1; }
      55%  { transform: translate(130px, -30px); opacity: 1; }
      65%  { transform: translate(130px, 0); opacity: 1; }
      80%  { transform: translate(130px, 0); opacity: 0; }
      95%  { transform: translate(0, 0); opacity: 0; }
      100% { transform: translate(0, 0); opacity: 1; }
    }
    @keyframes boxScroll {
      0%   { transform: translateX(-30px); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateX(30px); opacity: 0; }
    }
    @keyframes boxAppear {
      0%   { opacity: 0; transform: translateY(10px); }
      60%  { opacity: 0; transform: translateY(10px); }
      70%  { opacity: 1; transform: translateY(0); }
      90%  { opacity: 1; transform: translateY(0); }
      95%  { opacity: 0; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(10px); }
    }
    @keyframes screenPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 700; }
      to { stroke-dashoffset: 0; }
    }

    .arm-group { transform-origin: 200px 195px; animation: armPickPlace 5s ease-in-out infinite 1.5s; }
    .gripper-finger-l { animation: gripperLeft 5s ease-in-out infinite 1.5s; }
    .gripper-finger-r { animation: gripperRight 5s ease-in-out infinite 1.5s; }
    .picked-box { animation: boxPickPlace 5s ease-in-out infinite 1.5s; }
    .belt-box1 { animation: boxScroll 5s ease-in-out infinite; }
    .belt-box2 { animation: boxScroll 5s ease-in-out infinite 2.5s; }
    .placed-box { animation: boxAppear 5s ease-in-out infinite 1.5s; }
    .laptop-dash { animation: screenPulse 2.5s ease-in-out infinite; }
    .ground-line { stroke-dasharray: 700; animation: drawLine 1.5s ease-out forwards; }
    .robot-group { opacity: 0; animation: fadeSlideUp 0.6s ease-out 0.3s forwards; }
    .conveyor-group { opacity: 0; animation: fadeSlideUp 0.6s ease-out 0.6s forwards; }
    .laptop-group { opacity: 0; animation: fadeSlideUp 0.6s ease-out 0.9s forwards; }
    .text-group { opacity: 0; animation: fadeSlideUp 0.6s ease-out 1.2s forwards; }
    .place-group { opacity: 0; animation: fadeSlideUp 0.6s ease-out 0.8s forwards; }
  </style>

  <line class="ground ground-line" x1="60" y1="220" x2="740" y2="220" />

  <g class="robot-group">
    <rect x="155" y="195" width="90" height="25" rx="4" class="arm-base" />
    <rect x="175" y="185" width="50" height="15" rx="3" class="arm-base" />
    <g class="arm-group">
      <circle cx="200" cy="185" r="10" class="arm-joint" />
      <rect x="195" y="115" width="10" height="70" rx="3" class="arm-seg1" />
      <circle cx="200" cy="115" r="9" class="arm-joint" />
      <rect x="200" y="103" width="80" height="10" rx="3" class="arm-seg2" transform="rotate(12, 200, 108)" />
      <circle cx="278" cy="112" r="7" class="arm-joint" />
      <rect x="275" y="112" width="8" height="40" rx="2" class="arm-seg3" transform="rotate(-3, 279, 112)" />
      <polygon points="271,150 289,150 293,162 267,162" class="arm-gripper" />
      <rect x="269" y="162" width="6" height="12" rx="1" class="arm-gripper gripper-finger-l" />
      <rect x="285" y="162" width="6" height="12" rx="1" class="arm-gripper gripper-finger-r" />
    </g>
  </g>

  <g class="conveyor-group">
    <rect x="310" y="195" width="180" height="22" rx="11" class="conveyor-belt" />
    <rect x="318" y="190" width="164" height="8" rx="2" class="conveyor-belt" />
    <rect x="345" y="165" width="26" height="25" rx="2" class="box picked-box" />
    <rect x="395" y="165" width="26" height="25" rx="2" class="box belt-box1" />
    <rect x="440" y="165" width="26" height="25" rx="2" class="box belt-box2" />
  </g>

  <g class="place-group">
    <rect x="520" y="200" width="60" height="18" rx="3" class="arm-base" />
    <rect x="530" y="195" width="40" height="8" rx="2" class="arm-base" />
    <rect x="537" y="170" width="26" height="25" rx="2" class="box placed-box" />
  </g>

  <g class="laptop-group">
    <rect x="620" y="130" width="100" height="70" rx="5" class="laptop-screen" />
    <line x1="632" y1="148" x2="665" y2="148" class="laptop-dash" style="animation-delay:0s" />
    <line x1="632" y1="159" x2="678" y2="159" class="laptop-dash" style="animation-delay:0.4s" />
    <line x1="632" y1="170" x2="658" y2="170" class="laptop-dash" style="animation-delay:0.8s" />
    <line x1="632" y1="181" x2="672" y2="181" class="laptop-dash" style="animation-delay:1.2s" />
    <rect x="688" y="168" width="5" height="16" rx="1" class="laptop-dash" style="animation-delay:0.2s;fill:white;stroke:none;" />
    <rect x="696" y="162" width="5" height="22" rx="1" class="laptop-dash" style="animation-delay:0.6s;fill:white;stroke:none;" />
    <rect x="704" y="171" width="5" height="13" rx="1" class="laptop-dash" style="animation-delay:1.0s;fill:white;stroke:none;" />
    <path d="M607,202 L615,200 L725,200 L733,202 L738,212 L602,212 Z" class="laptop-base" />
    <rect x="655" y="198" width="30" height="4" rx="2" class="laptop-base" />
  </g>

  <g class="text-group">
    <text x="400" y="268" text-anchor="middle" font-size="28" class="logo-text">CK Industrial Automation Services</text>
  </g>
</svg>
